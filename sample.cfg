# WT8P.cfg
# Per-field rules for reconcile_adif.py
#
# Copy this file to <CALLSIGN>.cfg (e.g. WT8P.cfg or TF_WT8P.cfg) and adjust
# as needed. Fields not listed here use the built-in defaults shown below.
#
# Valid rules:
#   lotw_wins  - Apply LoTW value to QRZ record (even if QRZ already has a value)
#   fill_blank - Only apply LoTW value if the QRZ field is currently empty
#   flag_only  - Report the difference in the CSV report but do not correct
#   skip       - Ignore this field entirely (no comparison, no report)
#
# Notes:
#   - STATE and CNTY are only compared for US contacts (DXCC=291).
#     Foreign administrative codes (e.g. Japanese prefecture numbers) are
#     automatically skipped regardless of this setting.
#   - GRIDSQUARE comparison uses only the first 4 characters. QRZ may have
#     more precision (6 or 8 chars) than LoTW — this is not treated as a
#     discrepancy.
#   - APP_LOTW_RXQSL (LoTW confirmation timestamp) maps to LOTW_QSL_RCVD
#     in QRZ. fill_blank is recommended to avoid overwriting an existing
#     confirmation date.
#   - MY_COUNTRY: LoTW uses verbose names (e.g. "UNITED STATES OF AMERICA")
#     which are automatically normalised before comparison.

[fields]

# ── Other party's location fields ──────────────────────────────────────────

# Grid square: LoTW wins on the first 4 characters.
# If QRZ has more precision than LoTW, the extra characters are preserved.
GRIDSQUARE   = lotw_wins

# Country name: fill blank only — QRZ often has a better-formatted name.
COUNTRY      = fill_blank

# DXCC entity code (integer).
DXCC         = lotw_wins

# CQ Zone (integer — leading zeros ignored in comparison).
CQZ          = lotw_wins

# ITU Zone (integer — leading zeros ignored in comparison).
ITUZ         = lotw_wins

# Mode: flag only — differences are worth reviewing but auto-correction
# can cause unintended changes (e.g. FT8 vs DATA).
MODE         = flag_only

# US State abbreviation (US contacts only).
STATE        = lotw_wins

# US County in ADIF format ST,County (US contacts only).
CNTY         = lotw_wins

# ── My station's fields ─────────────────────────────────────────────────────

# My country name.
MY_COUNTRY   = lotw_wins

# My CQ Zone.
MY_CQ_ZONE   = lotw_wins

# My ITU Zone.
MY_ITU_ZONE  = lotw_wins

# My DXCC entity code.
MY_DXCC      = lotw_wins

# My state abbreviation.
MY_STATE     = lotw_wins

# My county in ADIF format ST,County.
MY_CNTY      = lotw_wins

# ── LoTW confirmation ────────────────────────────────────────────────────────

# LoTW confirmation timestamp. Maps to LOTW_QSL_RCVD in QRZ.
# fill_blank is recommended — only populate if QRZ doesn't already have it.
APP_LOTW_RXQSL = fill_blank
